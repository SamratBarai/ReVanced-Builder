name: Build

on: 
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  patch:
    runs-on: windows-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: YouTube
        run: . Scripts\YouTube.ps1

      - name: ReVanced CLI
        run: . Scripts\ReVanced_CLI.ps1

      - name: Downloading ReVanced Patches
        run: . Scripts\ReVanced_Patches.ps1

      - name: Vanced MicroG
        run: . Scripts\MicroG.ps1

      - name: Zulu JDK
        run: . Scripts\Zulu_JDK.ps1

      # NEW STEP: Create the branding configuration
      - name: Create Patch Options
        shell: pwsh
        run: |
          $Options = @(
            @{
              patchName = "Custom branding name MeTube"
              options = @(
                @{
                  key = "appName"
                  value = "MeTube"
                }
              )
            }
          )
          $Options | ConvertTo-Json -Depth 10 | Set-Content -Path "ReVanced_Builder\options.json" -Encoding utf8

      - name: Building
        run: |
          & "$env:ProgramFiles\Zulu\zulu*\bin\java.exe" `
          -jar "ReVanced_Builder\revanced-cli.jar" `
          patch "ReVanced_Builder\youtube.apk" `
          --patches "ReVanced_Builder\revanced-patches.rvp" `
          --options "ReVanced_Builder\options.json" `
          -e "Custom branding name MeTube"
          --purge `
          -b `
          --out "ReVanced_Builder\youtube_revanced.apk"

      - name: Creating archive
        run: |
          $Parameters = @{
              Path             = "ReVanced_Builder\youtube_revanced.apk", "ReVanced_Builder\microg.apk", "ReVanced_Builder\microg-huawei.apk"
              DestinationPath  = "ReVanced.zip"
              CompressionLevel = "Fastest"
              Force            = $true
          }
          Compress-Archive @Parameters

      - name: Generate Dynamic Tag & Release Notes
        id: prep_release
        shell: pwsh
        run: |
          $DateStr = Get-Date -f "yyyy.MM.dd"
          git fetch --tags
          $ExistingTags = git tag -l "$DateStr-v*" | Sort-Object -Descending
          $NextVersion = if ($ExistingTags.Count -eq 0) { 1 } else { [int]($ExistingTags[0].Split('-v')[-1]) + 1 }
          $FinalTag = "$DateStr-v$NextVersion"
          echo "RELEASE_TAG=$FinalTag" >> $env:GITHUB_ENV
          
          $TemplatePath = "ReleaseNotesTemplate.md"
          if (Test-Path $TemplatePath) {
              (Get-Content $TemplatePath -Raw) `
                .Replace("YouTubeTag", "${{ env.LatestSupportedYT }}") `
                .Replace("CLITag", "${{ env.CLIvtag }}") `
                .Replace("PatchesTag", "${{ env.Patchesvtag }}") `
                .Replace("MicroGTag", "${{ env.MicroGTag }}") `
                .Replace("ZuluTag", "${{ env.ZuluTag }}") | Set-Content $TemplatePath -Force
          }
          echo "ReleaseBody=$TemplatePath" >> $env:GITHUB_OUTPUT

      - name: Push Tag with Fallback
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          try {
              git tag "${{ env.RELEASE_TAG }}"
              git push origin "${{ env.RELEASE_TAG }}"
          } catch {
              $FallbackTag = "${{ env.RELEASE_TAG }}-run-${{ github.run_id }}"
              echo "RELEASE_TAG=$FallbackTag" >> $env:GITHUB_ENV
              git tag "$FallbackTag"
              git push origin "$FallbackTag"
          }

      - name: Uploading Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Build ${{ env.RELEASE_TAG }}"
          tag_name: ${{ env.RELEASE_TAG }}
          files: ReVanced.zip
          body_path: ${{ steps.prep_release.outputs.ReleaseBody }}
          token: ${{ github.token }}
          
